version: "3.9"

services:
  gantt:
    build: .
    image: gantt:latest
    container_name: gantt_app
    restart: unless-stopped
    ports:
      - "1258:1258"
    volumes:
      - gantt_data:/app/data
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
      - FLASK_RUN_HOST=0.0.0.0
      - FLASK_RUN_PORT=1258
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1258/api/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: python app.py

volumes:
  gantt_data:
    name: gantt_data
